services:
  - type: web
    name: med-systems-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: STORAGE_PROVIDER
        value: s3
      - key: S3_REGION
        value: us-east-1
      - key: S3_PREFIX
        value: library/
      - key: S3_FORCE_PATH_STYLE
        value: false
      - key: EMBEDDINGS_PROVIDER
        value: local
